name: Build and Release

on:
  workflow_run:
    workflows: ["Auto-update Docs"]
    types:
      - completed

jobs:
  build-windows:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Create .env file
        run: |
          echo "EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }}" >> .env
          echo "EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}" >> .env

      - name: Fetch SDE
        run: node scripts/fetch-sde.js

      - name: Build Windows exe
        run: npx electron-builder --win --x64 --publish never

      # Release notes = only the TOP version section of CHANGELOG.md (from the
      # first "## [" header to the next), so each release shows its own notes
      # instead of the entire (previously stale-looking) changelog.
      - name: Extract latest changelog section
        shell: bash
        run: |
          awk '/^## \[/{c++} c==1' CHANGELOG.md > RELEASE_NOTES.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          body_path: RELEASE_NOTES.md
          tag_name: ${{ github.event.workflow_run.head_branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Create .env file
        run: |
          echo "EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }}" >> .env
          echo "EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}" >> .env

      - name: Fetch SDE
        run: node scripts/fetch-sde.js

      - name: Build macOS dmg
        run: npx electron-builder --mac --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          tag_name: ${{ github.event.workflow_run.head_branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build and Release

on:
  workflow_run:
    workflows: ["Auto-update Docs"]
    types:
      - completed

jobs:
  build-windows:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Create .env file
        run: |
          echo "EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }}" >> .env
          echo "EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}" >> .env
          echo "PRESENCE_URL=${{ secrets.PRESENCE_URL }}" >> .env

      - name: Fetch SDE
        run: node scripts/fetch-sde.js

      - name: Build Windows exe
        run: npx electron-builder --win --x64 --publish never

      # Release notes = the CHANGELOG.md section MATCHING the tag being
      # released (## [x.y.z]), so every release gets its own notes. Falls back
      # to the newest section only if the tag has no dedicated entry —
      # previously this always took the top section, which stamped the same
      # stale notes onto every release.
      - name: Extract changelog section for this tag
        shell: bash
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VER="${TAG#v}"
          awk -v ver="$VER" '
            /^## \[/ { on = (index($0, "## [" ver "]") == 1) }
            on
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! [ -s RELEASE_NOTES.md ]; then
            echo "No changelog section for $VER — falling back to newest section"
            awk '/^## \[/{c++} c==1' CHANGELOG.md > RELEASE_NOTES.md
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          body_path: RELEASE_NOTES.md
          tag_name: ${{ github.event.workflow_run.head_branch }}
          # Publish as a STABLE release (not pre-release) so GitHub's
          # /releases/latest returns it — older installed clients check that
          # endpoint, which excludes pre-releases.
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Create .env file
        run: |
          echo "EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }}" >> .env
          echo "EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}" >> .env
          echo "PRESENCE_URL=${{ secrets.PRESENCE_URL }}" >> .env

      - name: Fetch SDE
        run: node scripts/fetch-sde.js

      - name: Build macOS dmg
        run: npx electron-builder --mac --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          tag_name: ${{ github.event.workflow_run.head_branch }}
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
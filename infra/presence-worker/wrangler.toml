name = "eve-carbon-presence"
main = "worker.js"
compatibility_date = "2026-07-01"

[[durable_objects.bindings]]
name = "PRESENCE"
class_name = "PresenceCounter"

# SQLite-backed DO classes are required on the free plan (we never actually
# write to storage — the counter is memory-only by design).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PresenceCounter"]

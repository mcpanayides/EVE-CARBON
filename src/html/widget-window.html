<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EVE Carbon Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/base.css"/>
  <link rel="stylesheet" href="../styles/dashboard.css"/>
  <link rel="stylesheet" href="../styles/glass.css"/>
  <style>
    /* ── Popout shell — a single floating glass widget ── */
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      background: transparent;   /* the acrylic (or solid fallback) shows through */
    }
    /* base.css body glows/hatch are for the main app — not needed here */
    body::before, body::after { display: none; }

    body.glass-on { background-color: rgba(var(--glass-tint-rgb), var(--glass-bg-alpha)); }

    .pw-titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 8px 14px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      border-bottom: 1px solid var(--glass-edge, rgba(255,255,255,0.09));
      background: rgba(var(--glass-tint-rgb, 8, 8, 12), calc(var(--glass-tint-alpha, 0.52) * 0.7));
    }
    .pw-icon  { font-size: 16px; color: var(--accent); flex-shrink: 0; }
    .pw-title {
      flex: 1; min-width: 0;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-1); font-family: var(--mono);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pw-btn {
      -webkit-app-region: no-drag;
      width: 26px; height: 26px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid transparent; border-radius: 8px;
      color: var(--text-3); cursor: pointer; font-size: 13px; line-height: 1;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .pw-btn:hover { color: var(--text-1); border-color: var(--glass-edge, rgba(255,255,255,0.12)); background: rgba(255,255,255,0.05); }
    .pw-btn.pinned { color: var(--accent); border-color: var(--accent-30, rgba(192,57,43,0.3)); }
    .pw-btn .material-symbols-outlined { font-size: 15px; }

    .pw-content {
      flex: 1; min-height: 0;
      overflow-y: auto;
      padding: 10px 12px;
    }
    .pw-content::-webkit-scrollbar       { width: 4px; }
    .pw-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Mirrored content is display-only — hide dashboard chrome that leaked in,
       and neutralise clicks (buttons in the mirror have no handlers here). */
    .pw-content .dnd-grip,
    .pw-content .dashboard-widget-remove,
    .pw-content .dashboard-widget-popout { display: none !important; }
    .pw-content button { pointer-events: none; }

    .pw-empty {
      padding: 24px 0; text-align: center;
      color: var(--text-3); font-family: var(--mono); font-size: 11px;
    }
  </style>
</head>
<body>
  <!-- Glass mode + resolved tint, shared with the main window via localStorage -->
  <script>
  (function () {
    try {
      var g = JSON.parse(localStorage.getItem('eve-glass') || 'null');
      if (!g || g.enabled !== false) {
        document.body.classList.add('glass-on');
        var r = document.documentElement.style;
        if (g && g._surfaceRgb)       r.setProperty('--glass-tint-rgb',   g._surfaceRgb);
        if (g && g.tintAlpha != null) r.setProperty('--glass-tint-alpha', g.tintAlpha);
        if (g && g.bgAlpha  != null)  r.setProperty('--glass-bg-alpha',   g.bgAlpha);
      }
    } catch (e) {}
  })();
  </script>

  <div class="pw-titlebar">
    <span class="material-symbols-outlined pw-icon" id="pwIcon" style="display:none;"></span>
    <span class="pw-title" id="pwTitle">WIDGET</span>
    <button class="pw-btn" id="pwPinBtn" title="Keep on top">
      <span class="material-symbols-outlined">keep</span>
    </button>
    <button class="pw-btn" id="pwPopInBtn" title="Return to dashboard">
      <span class="material-symbols-outlined">close_fullscreen</span>
    </button>
  </div>

  <div class="pw-content" id="pwContent">
    <div class="pw-empty">Connecting to dashboard…</div>
  </div>

  <script>
  (function () {
    const params   = new URLSearchParams(location.search);
    const widgetId = params.get('id')    || '';
    const title    = params.get('title') || 'WIDGET';

    document.getElementById('pwTitle').textContent = title;
    document.title = `EVE Carbon — ${title}`;

    // Live content pushed from the dashboard (via main process relay)
    window.eveAPI?.onWidgetContent?.((data) => {
      if (!data || data.id !== widgetId) return;
      if (data.title) document.getElementById('pwTitle').textContent = data.title;
      document.getElementById('pwContent').innerHTML =
        data.html || '<div class="pw-empty">Widget is empty.</div>';
    });

    // Pin (always-on-top) toggle
    let pinned = false;
    document.getElementById('pwPinBtn').addEventListener('click', () => {
      pinned = !pinned;
      document.getElementById('pwPinBtn').classList.toggle('pinned', pinned);
      window.eveAPI?.widgetPopoutPin?.({ id: widgetId, pinned });
    });

    // Pop back into the dashboard (window close does the same)
    document.getElementById('pwPopInBtn').addEventListener('click', () => {
      window.eveAPI?.widgetPopoutClose?.(widgetId);
    });

    // Tell the dashboard we're ready for the first push
    window.eveAPI?.widgetPopoutReady?.(widgetId);
  })();
  </script>
</body>
</html>

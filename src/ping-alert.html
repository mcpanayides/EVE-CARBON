<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Director Ping</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');

    :root {
      --bg:        #070b14;
      --bg-panel:  #0d1524;
      --border:    #1e3a5f;
      --accent:    #ab7ab8;
      --accent2:   #5b8dd9;
      --warn:      #e8b84b;
      --text-1:    #e8eaf0;
      --text-2:    #8899bb;
      --text-3:    #4a6080;
      --mono:      'Share Tech Mono', monospace;
      --display:   'Rajdhani', sans-serif;
      --red:       #c94040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 620px; height: 420px;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--display);
      color: var(--text-1);
      user-select: none;
      -webkit-app-region: drag; /* whole window is draggable */
    }

    /* ── Animated scan-line background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(91,141,217,0.03) 3px,
        rgba(91,141,217,0.03) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── Corner accents ── */
    .corner { position: absolute; width: 18px; height: 18px; z-index: 10; }
    .corner-tl { top:  8px; left:  8px; border-top:  2px solid var(--accent2); border-left:  2px solid var(--accent2); }
    .corner-tr { top:  8px; right: 8px; border-top:  2px solid var(--accent2); border-right: 2px solid var(--accent2); }
    .corner-bl { bottom: 8px; left:  8px; border-bottom: 2px solid var(--accent2); border-left:  2px solid var(--accent2); }
    .corner-br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--accent2); border-right: 2px solid var(--accent2); }

    /* ── Outer border glow ── */
    .shell {
      position: absolute; inset: 0;
      border: 1px solid var(--border);
      box-shadow:
        inset 0 0 40px rgba(91,141,217,0.06),
        0 0 0 1px rgba(91,141,217,0.12),
        0 0 30px rgba(91,141,217,0.15),
        0 0 60px rgba(171,122,184,0.08);
      z-index: 1;
      pointer-events: none;
    }

    /* ── Main layout ── */
    .window {
      position: relative;
      width: 620px; height: 420px;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }

    /* ── Title bar ── */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 10px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(91,141,217,0.08) 0%, transparent 60%);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    .alert-badge {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--warn);
      text-transform: uppercase;
    }

    .alert-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 8px var(--warn);
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .titlebar-title {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-1);
      text-transform: uppercase;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: rgba(201,64,64,0.12);
      color: var(--text-2);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .close-btn:hover {
      background: rgba(201,64,64,0.35);
      border-color: var(--red);
      color: #fff;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
      padding: 0;
    }

    /* ── Who pinged banner ── */
    .from-banner {
      padding: 10px 20px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 10px;
      background: rgba(91,141,217,0.04);
      flex-shrink: 0;
    }

    .from-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-3);
      text-transform: uppercase;
    }

    .from-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent2);
    }

    .from-time {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }

    /* ── Grid of parsed fields ── */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .field {
      background: var(--bg-panel);
      padding: 9px 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-3);
      text-transform: uppercase;
    }

    .field-value {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .field-value.highlight { color: var(--warn); }
    .field-value.muted     { color: var(--text-2); }

    /* ── HURF message ── */
    .hurf-block {
      flex: 1;
      padding: 12px 20px;
      overflow-y: auto;
      background: var(--bg);
    }

    .hurf-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-3);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .hurf-text {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-2);
      word-break: break-word;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(13,21,36,0.8);
      flex-shrink: 0;
    }

    .footer-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.08em;
    }

    .footer-meta span { color: var(--accent); }

    .dismiss-btn {
      -webkit-app-region: no-drag;
      padding: 5px 18px;
      background: rgba(91,141,217,0.1);
      border: 1px solid var(--accent2);
      border-radius: 4px;
      color: var(--accent2);
      font-family: var(--display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .dismiss-btn:hover {
      background: rgba(91,141,217,0.25);
      box-shadow: 0 0 10px rgba(91,141,217,0.3);
    }

    /* ── Countdown ring ── */
    .countdown-ring {
      position: relative;
      width: 28px; height: 28px;
      flex-shrink: 0;
    }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring .track { fill: none; stroke: var(--border); stroke-width: 2.5; }
    .countdown-ring .fill  {
      fill: none; stroke: var(--accent2); stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 75.4;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .countdown-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-2);
    }

    /* ── Entry animation ── */
    .window {
      animation: slide-in 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: scale(0.94) translateY(-10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="shell"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="window">
    <!-- Title bar -->
    <div class="titlebar">
      <div class="alert-badge">
        <div class="alert-dot"></div>
        Director Ping
      </div>
      <div class="titlebar-title" id="sigLabel">Broadcast</div>
      <button class="close-btn" id="closeBtn" title="Dismiss">✕</button>
    </div>

    <!-- Who pinged -->
    <div class="from-banner">
      <span class="from-label">From</span>
      <span class="from-name" id="fromName">—</span>
      <span class="from-time" id="eveTime">—</span>
    </div>

    <!-- Parsed fields grid -->
    <div class="fields-grid">
      <div class="field">
        <span class="field-label">FC Name</span>
        <span class="field-value highlight" id="fcName">—</span>
      </div>
      <div class="field">
        <span class="field-label">Formup Location</span>
        <span class="field-value highlight" id="formupLoc">—</span>
      </div>
      <div class="field">
        <span class="field-label">PAP Type</span>
        <span class="field-value" id="papType">—</span>
      </div>
      <div class="field">
        <span class="field-label">Doctrine</span>
        <span class="field-value" id="doctrine">—</span>
      </div>
    </div>

    <!-- HURF -->
    <div class="hurf-block">
      <div class="hurf-label">Message</div>
      <div class="hurf-text" id="hurfText">—</div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-meta">
        Target: <span id="targetSig">—</span>
        &nbsp;·&nbsp;
        Sig: <span id="sigName">—</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="countdown-ring" title="Auto-dismiss">
          <svg width="28" height="28" viewBox="0 0 28 28">
            <circle class="track" cx="14" cy="14" r="12"/>
            <circle class="fill"  cx="14" cy="14" r="12" id="countdownArc"/>
          </svg>
          <div class="countdown-num" id="countdownNum">30</div>
        </div>
        <button class="dismiss-btn" id="dismissBtn">Dismiss</button>
      </div>
    </div>
  </div>

  <script>
    const DISMISS_SECS = 30;
    const CIRCUMFERENCE = 2 * Math.PI * 12; // 75.398

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function stripInvisible(str) {
      if (!str) return '';
      return str.replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u2064\uFEFF\u00AD\uFFFD]/g, '').trim();
    }

    function shortDoctrine(str) {
      if (!str) return '—';
      // Strip URLs, trim to first ~30 chars
      const clean = str.replace(/https?:\/\/\S+/g, '').trim();
      return clean.length > 35 ? clean.slice(0, 34) + '…' : clean || '—';
    }

    function populate(msg) {
      // msg may be a full DB row (has eve_timecode, fc_name etc.)
      // or a raw live message (has body, from, isDirector)
      const fcName    = msg.fc_name         || '—';
      const formup    = msg.formup_location  || '—';
      const papType   = msg.pap_type         || '—';
      const doctrine  = msg.doctrine         || '—';
      const hurf      = msg.hurf             || stripInvisible(msg.body || '') || '—';
      const from      = msg.gsol_member      || msg.who_pinged || (msg.from || '').split('/').pop() || '—';
      const eveTime   = msg.eve_timecode     || msg.ping_timestamp || '—';
      const target    = msg.target_sig       || '—';
      const sig       = msg.sig              || '—';

      document.getElementById('sigLabel').textContent   = sig !== '—' ? sig.toUpperCase() + ' BROADCAST' : 'DIRECTOR BROADCAST';
      document.getElementById('fromName').textContent   = from;
      document.getElementById('eveTime').textContent    = eveTime + (eveTime !== '—' ? ' EVE' : '');
      document.getElementById('fcName').textContent     = fcName;
      document.getElementById('formupLoc').textContent  = formup;
      document.getElementById('papType').textContent    = papType;
      document.getElementById('doctrine').textContent   = shortDoctrine(doctrine);
      document.getElementById('doctrine').title         = doctrine;
      document.getElementById('hurfText').textContent   = hurf;
      document.getElementById('targetSig').textContent  = target;
      document.getElementById('sigName').textContent    = sig;
    }

    // ── Countdown ──
    let secsLeft = DISMISS_SECS;
    const arc = document.getElementById('countdownArc');
    const num = document.getElementById('countdownNum');

    function tick() {
      secsLeft--;
      num.textContent = secsLeft;
      arc.style.strokeDashoffset = CIRCUMFERENCE * (1 - secsLeft / DISMISS_SECS);
      if (secsLeft <= 0) close();
    }

    const timer = setInterval(tick, 1000);
    arc.style.strokeDasharray  = CIRCUMFERENCE;
    arc.style.strokeDashoffset = 0;

    function close() {
      clearInterval(timer);
      window.close();
    }

    document.getElementById('closeBtn').addEventListener('click', close);
    document.getElementById('dismissBtn').addEventListener('click', close);

    // ── Receive data from main process ──
    window.eveAPI.on('ping-alert-data', (msg) => {
      populate(msg);
    });
  </script>
</body>
</html>
